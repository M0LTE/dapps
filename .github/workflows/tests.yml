name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS-based action into Node.js 24. GitHub will force-default this
# in June 2026; opting in now clears the deprecation warnings and verifies
# our actions are Node 24 compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pre-pull linbpq image
        run: docker pull m0lte/linbpq:latest

      - name: Restore
        run: dotnet restore src/dapps/dapps.sln

      - name: Build
        run: dotnet build src/dapps/dapps.sln --no-restore --configuration Release

      - name: Test (unit + integration)
        # Microsoft Testing Platform native runner — VSTest's --logger is
        # ignored under MTP. MTP's default console output is fine.
        run: dotnet test src/dapps/dapps.core.tests/dapps.core.tests.csproj --no-build --configuration Release
