name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Pre-pull linbpq image
        run: docker pull m0lte/linbpq:latest

      - name: Restore
        run: dotnet restore src/dapps/dapps.sln

      - name: Build
        run: dotnet build src/dapps/dapps.sln --no-restore --configuration Release

      - name: Test (unit + integration)
        run: dotnet test src/dapps/dapps.core.tests/dapps.core.tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
