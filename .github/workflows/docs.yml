name: docs

# Build the MkDocs site on every push to master and deploy it to the
# gh-pages branch. PRs build the site too (no deploy) so a docs PR
# fails CI if mkdocs strict-mode catches a broken link.

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write   # `mkdocs gh-deploy` force-pushes the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # `mkdocs gh-deploy` needs full history to push to gh-pages.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs/requirements.txt

      - run: pip install -r docs/requirements.txt

      - name: Build site (strict)
        # --strict turns warnings into errors — broken internal links,
        # missing nav entries, etc. Catches them before they ship.
        run: mkdocs build --strict

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: mkdocs gh-deploy --force --no-history
